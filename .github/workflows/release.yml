name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build Release
      run: |
        & "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\MSBuild\Current\Bin\MSBuild.exe" WampAutoSync.sln /p:Configuration=Release /p:Platform=x64

    - name: Get Version
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $env:GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: WampAutoSync v${{ steps.version.outputs.VERSION }}
        body: |
          ## WampAutoSync v${{ steps.version.outputs.VERSION }}
          
          ### Download
          - **WampAutoSync.exe** - Single file, no installation required
          
          ### Features
          - Auto sync PHP and MySQL CLI with active WampServer version
          - System tray application with context menu
          - Registry-based PATH updates
          - Static linking - no VC++ Redistributable needed
          
          ### Requirements
          - Windows 10/11
          - WampServer 3.x (64-bit)
          
          ### Usage
          1. Download `WampAutoSync.exe`
          2. Run it (right-click → Run as administrator recommended)
          3. Tray icon appears - app runs in background
          4. Open new terminal - `php --version` shows correct version
          
          See [README](https://github.com/${{ github.repository }}#readme) for details.
        files: x64/Release/WampAutoSync.exe
        draft: false
        prerelease: false
