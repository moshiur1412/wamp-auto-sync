name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build Release
      run: msbuild WampAutoSync.sln /p:Configuration=Release /p:Platform=x64

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WampAutoSync
        path: x64/Release/WampAutoSync.exe
        retention-days: 30
